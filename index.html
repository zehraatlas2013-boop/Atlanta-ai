<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLANTA AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #app { width: 420px; background: #1e293b; border-radius: 12px; padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); border: 1px solid #334155; }
        h2 { text-align: center; color: #22c55e; margin-bottom: 15px; }
        #chatbox { height: 380px; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #020617; scroll-behavior: smooth; border: 1px solid #334155; }
        .user { text-align: right; color: #38bdf8; margin: 8px 0; padding: 8px; border-radius: 8px; background: rgba(56, 189, 248, 0.1); word-wrap: break-word; }
        .bot { text-align: left; color: #22c55e; margin: 8px 0; padding: 8px; border-radius: 8px; background: rgba(34, 197, 94, 0.1); word-wrap: break-word; }
        #controls { display: flex; gap: 6px; }
        input { flex: 1; padding: 12px; border-radius: 6px; border: none; outline: none; background: #334155; color: white; font-size: 14px; }
        button { padding: 10px 18px; border: none; border-radius: 6px; background: #22c55e; color: black; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #16a34a; transform: scale(1.02); }
        
        /* Firefox için Scrollbar tasarımı */
        #chatbox {
            scrollbar-width: thin;
            scrollbar-color: #334155 #020617;
        }
        /* Chrome/Edge/Safari için Scrollbar */
        #chatbox::-webkit-scrollbar { width: 5px; }
        #chatbox::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="app">
    <h2>Atlanta AI 🤖</h2>
    <div id="chatbox"></div>
    <div id="controls">
        <input id="input" placeholder="Bir şey yazın..." autocomplete="off" />
        <button id="sendBtn">Gönder</button>
    </div>
</div>

<script>
// 🔑 API anahtarının başındaki boşluğu sildim!
const API_KEY = "AIzaSyAgRGL12PySTyawr_KtzfwGKbcbpqXzBbw"; 

const localResponses = {
    "merhaba": ["Merhaba! Sana nasıl yardımcı olabilirim? 🌿", "Selam! Bugün neler yapıyoruz?"],
    "nasılsın": ["Harikayım! Senin için kodları tarıyorum 😊", "Gayet iyiyim, seni sormalı?"],
    "adın ne": ["Benim adım ATLANTA AI 🤖"]
};

async function getAIResponse(prompt) {
    const lowerPrompt = prompt.toLowerCase();

    for (let key in localResponses) {
        if (lowerPrompt.includes(key)) {
            const arr = localResponses[key];
            return arr[Math.floor(Math.random() * arr.length)];
        }
    }

    try {
        // Firefox uyumluluğu için URLSearchParams veya template literal'da boşluk olmadığından emin oluyoruz
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        const response = await fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: prompt }]
                }]
            })
        });

        const data = await response.json();
        
        if (data.error) {
            return "Hata: " + data.error.message;
        }

        if (data.candidates && data.candidates[0].content) {
            return data.candidates[0].content.parts[0].text;
        }
        
        return "Yanıt alınamadı.";

    } catch (err) {
        console.error("Bağlantı Hatası:", err);
        return "Bağlantı kurulamadı. Firefox üzerinde CORS ayarlarını veya internetini kontrol et. 🌐";
    }
}

async function send() {
    const input = document.getElementById("input");
    const chat = document.getElementById("chatbox");
    const userText = input.value.trim();
    if (!userText) return;

    chat.innerHTML += `<div class='user'><b>Sen:</b><br>${userText}</div>`;
    input.value = "";
    chat.scrollTop = chat.scrollHeight;

    const botId = "bot-" + Date.now();
    chat.innerHTML += `<div class='bot' id='${botId}'><b>AI:</b> Düşünüyorum...</div>`;
    chat.scrollTop = chat.scrollHeight;

    const botText = await getAIResponse(userText);
    
    const botElement = document.getElementById(botId);
    // Firefox'ta güvenli HTML render için bir yöntem
    botElement.innerHTML = `<b>AI:</b><br>${botText.replace(/\n/g, '<br>')}`;
    chat.scrollTop = chat.scrollHeight;
}

// Olay dinleyicilerini daha modern şekilde ekliyoruz
document.getElementById("sendBtn").addEventListener("click", send);
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
