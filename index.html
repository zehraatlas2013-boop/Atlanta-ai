<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Atlanta AI</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 100%; max-width: 500px; height: 400px; border: 1px solid #444; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 10px; background: #222; }
        .input-area { display: flex; gap: 10px; width: 100%; max-width: 500px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .user-msg { color: #00d4ff; margin: 5px 0; }
        .ai-msg { color: #00ff88; margin: 5px 0; }
    </style>
</head>
<body>

    <h2>Atlanta AI 🤖</h2>
    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Bir şey yazın...">
        <button onclick="sendMessage()">Gönder</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            if (!input.value) return;

            // Senin mesajın
            chatBox.innerHTML += `<div class="user-msg"><b>Sen:</b> ${input.value}</div>`;
            
            // BURAYA ANAHTARINI YAPIŞTIR
            const API_KEY = " AIzaSyAgRGL12PySTyawr_KtzfwGKbcbpqXzBbw"; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            const text = input.value;
            input.value = '';

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                chatBox.innerHTML += `<div class="ai-msg"><b>AI:</b> ${aiResponse}</div>`;
            } catch (e) {
                chatBox.innerHTML += `<div class="ai-msg"><i>Cevap alınamadı...</i></div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
